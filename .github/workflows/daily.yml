name: Daily Commit

on:
  schedule:
    - cron: '2 2 * * *'  # ⏰ 09:02 WIB setiap hari (karena GitHub pakai UTC)
  workflow_dispatch:       # bisa dijalankan manual juga

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Git Identity
        run: |
          git config user.name "Aphexya Bot"
          git config user.email "aphexya@users.noreply.github.com"

      - name: Append to daily.md
        run: |
          echo "🗓️ Daily commit at $(TZ='Asia/Jakarta' date)" >> daily.md

      - name: Commit and Push Changes
        run: |
          git add daily.md
          git commit -m "🕒 Daily commit at $(date '+%Y-%m-%d %H:%M:%S')"
          git push
