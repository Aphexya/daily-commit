name: Daily Commit

on:
  schedule:
    - cron: '0 2 * * *'  # Jam 09:00 WIB (karena GitHub pakai UTC)
  workflow_dispatch:     # Bisa dijalankan manual juga

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config user.name "Aphexya"
          git config user.email "ahmadafhaassalamiii@gmail.com"  # ganti jika perlu

      - name: Make Daily Commit
        run: |
          EMOJIS=("🔥" "✨" "📅" "✅" "🚀" "📌" "😎" "🧠" "🕒")
          CHOSEN=${EMOJIS[$RANDOM % ${#EMOJIS[@]}]}
          echo "Daily commit at $(date)" >> commit.log
          git add commit.log
          git commit -m "$CHOSEN Daily commit: $(date)"
          git push
